services:
  - type: web
    name: facial-hci-agent
    env: python
    plan: free
    region: oregon
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python -c "from src.facial_hci.perception.face_mesh import ensure_model; ensure_model()"
    startCommand: uvicorn dashboard.server:app --host 0.0.0.0 --port $PORT --ws-ping-interval 20
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: ENABLE_LLM_REASONING
        value: "true"
      - key: LLM_COOLDOWN_SECONDS
        value: "2.5"
      - key: LOG_LEVEL
        value: INFO
      - key: GROQ_API_KEY
        sync: false   # set manually in Render dashboard
