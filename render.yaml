services:
  - type: web
    name: facial-hci-agent
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: ENABLE_LLM_REASONING
        value: "true"
      - key: LLM_COOLDOWN_SECONDS
        value: "2.5"
      - key: LOG_LEVEL
        value: INFO
      - key: GROQ_API_KEY
        sync: false   # set manually in Render dashboard
